<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #sidenav
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="!isHandset()"
    class="sidenav"
    [fixedInViewport]="isHandset()"
  >
    <div class="logo-area">
      <mat-icon class="logo-icon">track_changes</mat-icon>
      <span class="logo-text">Job Hunt Tracker</span>
    </div>
    
    <mat-nav-list class="nav-list">
      @for (item of menuItems; track item.path) {
        <a
          mat-list-item
          [routerLink]="item.path"
          routerLinkActive="active-link"
          class="nav-item"
          (click)="isHandset() && sidenav.close()"
        >
          <mat-icon matListItemIcon class="nav-icon">{{ item.icon }}</mat-icon>
          <span matListItemTitle class="nav-label">{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="user-footer">
      <div class="user-info">
        <div class="avatar">{{ currentUser()?.name?.substring(0, 2)?.toUpperCase() }}</div>
        <div class="details">
          <div class="name">{{ currentUser()?.name }}</div>
          <div class="role">Developer</div>
        </div>
      </div>
      <button mat-icon-button (click)="logout()" title="Logout" class="logout-btn">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="top-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="toggle-btn">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="page-title">MEAN Stack CRM</span>
      <span class="spacer"></span>
      
      <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-menu-trigger">
        <div class="avatar-sm">{{ currentUser()?.name?.substring(0, 2)?.toUpperCase() }}</div>
        <span class="profile-name-txt">{{ currentUser()?.name }}</span>
        <mat-icon>arrow_drop_down</mat-icon>
      </button>
      <mat-menu #profileMenu="matMenu" xPosition="before" class="dark-menu">
        <button mat-menu-item routerLink="/dashboard">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </button>
        <button mat-menu-item routerLink="/followups">
          <mat-icon>notifications</mat-icon>
          <span>Follow-Ups</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="page-container">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
